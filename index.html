        <script>
            try {
                window.jQuery = window.$ = require("./tyrano/libs/jquery-3.6.0.min.js");

            try{
                
                if(window.studio_api){
                    //Win Macなど パッケージング時

                    window.process = window.studio_api.ipcRenderer.sendSync("getProcess");
                }else if (window.opener.window.studio_api) {
                    //プレビューのとき
                    window.studio_api = window.opener.window.studio_api;
                    window.process = window.opener.window.studio_api.ipcRenderer.sendSync("getProcess");

            }catch(e){
            
            }

        </script>

<link rel="preload" href="data/video/65.webm" as="video" type="video/webm">
<link rel="preload" href="data/bgm/tokinari.ogg" as="audio" type="audio/ogg">

<div id="loading-screen" dir="ltr" lang="ja" style="position:fixed !important; top:0 !important; left:0 !important; width:100% !important; height:100% !important; background-color:#111111 !important; z-index:9999999 !important; text-align:center !important; box-sizing:border-box !important; direction: ltr !important;">
  <div style="position:absolute !important; top:50% !important; left:50% !important; transform:translate(-50%, -50%) !important; width:100% !important; direction: ltr !important;">
    <div style="display:block !important; margin:0 0 20px 0 !important; text-align:center !important; direction: ltr !important;">
      <img id="loading-img" src="data/image/icon.png" style="width:200px !important; height:auto !important; display:inline-block !important;" alt="Loading" onerror="this.style.display='none';">
    </div>
    <div style="display:block !important; text-align:center !important; direction: ltr !important;">
      <p id="loading-text" dir="ltr" lang="ja" style="
        display:inline-block !important; font-size: 24px !important; font-weight: bold !important; letter-spacing: 2px !important; margin: 0 !important; color: #ffffff !important; text-align: center !important; direction: ltr !important;
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif !important;
        text-shadow: 2px 2px 0 #198CAA, -2px 2px 0 #198CAA, 2px -2px 0 #198CAA, -2px -2px 0 #198CAA, 2px 0px 0 #198CAA, -2px 0px 0 #198CAA, 0px 2px 0 #198CAA, 0px -2px 0 #198CAA !important;
      ">choi omachi</p>
    </div>
  </div>
</div>

<script>
  const checkTyranoStatus = setInterval(() => {
    if (window.TYRANO && window.TYRANO.kag && window.TYRANO.kag.ftag) {
      clearInterval(checkTyranoStatus);
      
      document.getElementById('loading-img').src = "data/image/icon3.png";
      document.getElementById('loading-text').innerText = "osuto hajimaru";
      document.getElementById('loading-screen').style.cursor = 'pointer';

      document.getElementById('loading-screen').addEventListener('click', function() {
        document.getElementById('loading-screen').style.pointerEvents = 'none';

        document.getElementById('loading-img').src = "data/image/icon2.png";
        document.getElementById('loading-text').innerText = "yaippee";

        setTimeout(function(){
          var screen = document.getElementById('loading-screen');
          screen.style.transition = 'opacity 0.4s';
          screen.style.opacity = '0';
          
          setTimeout(function(){
            screen.remove(); 
            
            window.TYRANO.kag.ftag.startTag("playbgm", {
              storage: "tokinari.ogg", 
              loop: "true",
              volume: "10"
            });

            var video = document.createElement('video');
            video.src = 'data/video/65.webm';
            video.style.position = 'fixed';
            video.style.top = '0';
            video.style.left = '0';
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.zIndex = '999998'; 
            video.style.backgroundColor = '#000000';
            video.autoplay = true;
            video.playsInline = true;
            document.body.appendChild(video);

            video.onended = function() {
              video.remove();
              window.TYRANO.page.awakeNextOrder(); 
            };
          }, 400);
        }, 800);
      }, { once: true });
    }
  }, 200);
</script>
